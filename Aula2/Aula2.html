<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2</title>
</head>
<body>
    <!--  Isto é um comentário -->
    <!-- Isto é o título principal da página-->
    <h1>Vamos falar de elementos HTML</h1>
    <!-- Strong e o em são elementos semânticos-->
    <p>Este é um <strong>parágrafo</strong> com <em>formatação</em></p>
    <!-- b e o i são elementos de formatação de texto-->
    <p>Este é um <b>parágrafo</b> com <i>formatação</i></p>
 
    <!-- IMG é uma tag que se fecha sozinha-->
    <img src="51PeDnU9S0L._AC_SL1500_.jpg" alt="Isto é uma caixa magnética"> 
    <img src="https://m.media-amazon.com/images/I/61qMb5XL3SL._SL1500_.jpg" alt="">
